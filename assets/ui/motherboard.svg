<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%" height="100%">
  <!-- Motherboard Base Layer -->
  <rect width="600" height="300" rx="12" fill="#002b36" stroke="#586e75" stroke-width="2" />
  
  <!-- High-Fidelity Circuit Copper Traces (Solarized Gold/Cyan) -->
  <g stroke="#2aa198" stroke-width="1" opacity="0.25" fill="none">
    <!-- Grid pattern background -->
    <path d="M 0 50 L 600 50 M 0 100 L 600 100 M 0 150 L 600 150 M 0 200 L 600 200 M 0 250 L 600 250" />
    <path d="M 100 0 L 100 300 M 200 0 L 200 300 M 300 0 L 300 300 M 400 0 L 400 300 M 500 0 L 500 300" />
    
    <!-- Diagonal motherboard paths -->
    <path d="M 50 50 L 120 120 L 220 120 M 120 120 L 120 220 M 300 20 L 340 60 L 340 180" />
    <path d="M 450 250 L 400 200 L 320 200 M 400 200 L 400 120" />
    <path d="M 270 280 L 290 260 L 450 260" />
  </g>

  <!-- Gold Motherboard Mounting Screws -->
  <g fill="#b58900" stroke="#073642" stroke-width="1.5" opacity="0.85">
    <circle cx="25" cy="25" r="5" />
    <circle cx="575" cy="25" r="5" />
    <circle cx="25" cy="275" r="5" />
    <circle cx="575" cy="275" r="5" />
  </g>

  <!-- Data Bus 1: Disk (SSD) -> RAM -->
  <path id="bus-disk-ram" class="mobo-bus" d="M 140 150 L 250 150" />

  <!-- Data Bus 2: RAM -> CPU -->
  <path id="bus-ram-cpu" class="mobo-bus" d="M 350 150 L 460 150" />

  <!-- Component Group 1: Disk Drive (SSD) -->
  <g id="part-disk">
    <!-- Main outer slot interaction boundary -->
    <rect class="mobo-part" x="40" y="80" width="100" height="140" rx="6" />
    
    <!-- SSD Aesthetic detailing -->
    <g transform="translate(40, 80)" pointer-events="none">
      <!-- Metallic Case Accent -->
      <path d="M 10 10 L 90 10" stroke="#586e75" stroke-width="2" />
      <path d="M 10 130 L 90 130" stroke="#586e75" stroke-width="2" />
      
      <!-- Integrated Circuit Chips inside the SSD layout -->
      <rect x="25" y="30" width="50" height="30" rx="2" fill="#073642" stroke="#93a1a1" stroke-width="1" />
      <rect x="25" y="70" width="50" height="30" rx="2" fill="#073642" stroke="#93a1a1" stroke-width="1" />
      
      <!-- Controller Chip & Connector Traces -->
      <rect x="35" y="110" width="30" height="15" rx="1" fill="#586e75" />
      
      <!-- Labels -->
      <text x="50" y="15" fill="#93a1a1" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">SSD / DISK</text>
    </g>
  </g>

  <!-- Component Group 2: RAM (Memory Slots) -->
  <g id="part-ram">
    <!-- Main outer slot interaction boundary -->
    <rect class="mobo-part" x="250" y="60" width="100" height="180" rx="6" />
    
    <!-- RAM Stick Aesthetic detailing -->
    <g transform="translate(250, 60)" pointer-events="none">
      <!-- SMT DIMM Slot Rails -->
      <rect x="20" y="20" width="12" height="140" rx="1" fill="#073642" stroke="#586e75" stroke-width="1" />
      <rect x="44" y="20" width="12" height="140" rx="1" fill="#073642" stroke="#586e75" stroke-width="1" />
      <rect x="68" y="20" width="12" height="140" rx="1" fill="#073642" stroke="#586e75" stroke-width="1" />
      
      <!-- Silver Memory Chips Populated on DIMM Rails -->
      <rect x="23" y="40" width="6" height="15" rx="1" fill="#93a1a1" />
      <rect x="23" y="70" width="6" height="15" rx="1" fill="#93a1a1" />
      <rect x="23" y="100" width="6" height="15" rx="1" fill="#93a1a1" />
      
      <rect x="47" y="50" width="6" height="15" rx="1" fill="#93a1a1" />
      <rect x="47" y="80" width="6" height="15" rx="1" fill="#93a1a1" />
      <rect x="47" y="110" width="6" height="15" rx="1" fill="#93a1a1" />
      
      <!-- Gold DIMM Pin Connectors -->
      <line x1="26" y1="160" x2="74" y2="160" stroke="#b58900" stroke-width="3" stroke-dasharray="2 1" />
      
      <!-- Labels -->
      <text x="50" y="15" fill="#93a1a1" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">RAM (MEM)</text>
    </g>
  </g>

  <!-- Component Group 3: CPU (Central Processor) -->
  <g id="part-cpu">
    <!-- Main outer slot interaction boundary -->
    <rect class="mobo-part" x="460" y="80" width="100" height="140" rx="8" />
    
    <!-- CPU Core Socket Aesthetic detailing -->
    <g transform="translate(460, 80)" pointer-events="none">
      <!-- Outer Core Heatsink Boundary -->
      <rect x="15" y="20" width="70" height="100" rx="4" fill="#073642" stroke="#586e75" stroke-width="1.5" />
      
      <!-- Silicon Core Die (Glossy Gold Bezel) -->
      <rect x="30" y="45" width="40" height="50" rx="2" fill="#b58900" opacity="0.3" stroke="#b58900" stroke-width="2" />
      <rect x="35" y="52" width="30" height="36" rx="1" fill="#268bd2" />
      
      <!-- Capacitor SMT Blocks surrounding the die -->
      <rect x="20" y="40" width="4" height="6" fill="#93a1a1" />
      <rect x="20" y="60" width="4" height="6" fill="#93a1a1" />
      <rect x="20" y="80" width="4" height="6" fill="#93a1a1" />
      <rect x="76" y="40" width="4" height="6" fill="#93a1a1" />
      <rect x="76" y="60" width="4" height="6" fill="#93a1a1" />
      <rect x="76" y="80" width="4" height="6" fill="#93a1a1" />
      
      <!-- Labels -->
      <text x="50" y="15" fill="#93a1a1" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">CPU (CORE)</text>
    </g>
  </g>
</svg>
