<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <!-- Sleek Solarized Dark PCB Base -->
  <rect width="800" height="400" rx="14" fill="#002b36" stroke="#586e75" stroke-width="2.5" />
  
  <!-- Complex High-Fidelity Circuit Traces (Background Aesthetics) -->
  <g stroke="#2aa198" stroke-width="1.2" opacity="0.15" fill="none" pointer-events="none">
    <!-- Grid -->
    <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200 M 0 250 L 800 250 M 0 300 L 800 300 M 0 350 L 800 350" />
    <path d="M 100 0 L 100 400 M 200 0 L 200 400 M 300 0 L 300 400 M 400 0 L 400 400 M 500 0 L 500 400 M 600 0 L 600 400 M 700 0 L 700 400" />
    
    <!-- Diagonal traces -->
    <path d="M 30 40 L 90 100 L 180 100 M 90 100 L 90 220" />
    <path d="M 770 360 L 710 300 L 600 300" />
    <path d="M 360 40 L 410 90 L 410 210" />
    <path d="M 500 350 L 540 310 L 670 310" />
    <path d="M 220 380 L 250 350 L 390 350" />
  </g>

  <!-- Gold PCB Mounting Screws -->
  <g fill="#b58900" stroke="#073642" stroke-width="2" opacity="0.8">
    <circle cx="30" cy="30" r="6" />
    <circle cx="770" cy="30" r="6" />
    <circle cx="30" cy="370" r="6" />
    <circle cx="770" cy="370" r="6" />
  </g>

  <!-- ========================================================================= -->
  <!-- HIGHWAY INTERACTIVE SYSTEM DATA BUS TRACES (ANIMATABLE NEON FLOWS)        -->
  <!-- ========================================================================= -->
  
  <!-- 1. SSD to Chipset -->
  <path id="bus-ssd-chipset" class="mobo-bus" d="M 180 200 L 340 200" />

  <!-- 2. Chipset to RAM -->
  <path id="bus-chipset-ram" class="mobo-bus" d="M 390 200 L 390 135 L 430 135" />

  <!-- 3. RAM to Chipset -->
  <path id="bus-ram-chipset" class="mobo-bus" d="M 430 145 L 400 145 L 400 205 L 390 205" />

  <!-- 4. Chipset to CPU (System Bus) -->
  <path id="bus-chipset-cpu" class="mobo-bus" d="M 420 230 L 600 230" />

  <!-- ========================================================================= -->
  <!-- COMPONENT 1: DETAILED M.2 NVME SSD CARD                                   -->
  <!-- ========================================================================= -->
  <g id="part-ssd">
    <!-- Component Slot Boundary -->
    <rect class="mobo-part" x="40" y="110" width="140" height="180" rx="8" />
    
    <!-- Motherboard M.2 Socket Connector (Right Side) -->
    <rect x="175" y="150" width="10" height="100" rx="2" fill="#073642" stroke="#586e75" stroke-width="1.5" />
    
    <!-- M.2 SSD PCB (slotted into the socket) -->
    <g transform="translate(45, 120)">
      <!-- SSD Card Body -->
      <rect width="125" height="160" rx="4" fill="#073642" stroke="#2aa198" stroke-width="1.5" />
      
      <!-- Keyed Gold Fingers (Right Edge Pin Contacts inside connector) -->
      <line x1="125" y1="35" x2="125" y2="125" stroke="#b58900" stroke-width="3" stroke-dasharray="3 1.5" />
      
      <!-- Left side semi-circular mounting notch -->
      <path d="M 0 72 A 8 8 0 0 1 0 88 Z" fill="#002b36" stroke="#2aa198" stroke-width="1.5" />
      <!-- Gold washer & Silver Motherboard Lock Screw -->
      <circle cx="0" cy="80" r="6" fill="#b58900" />
      <circle cx="0" cy="80" r="3.5" fill="#93a1a1" stroke="#586e75" stroke-width="1" />
      
      <!-- NAND Flash Memory Chip 0 -->
      <rect x="15" y="20" width="45" height="50" rx="2" fill="#002b36" stroke="#93a1a1" stroke-width="1" />
      <path d="M 15 28 L 60 28 M 15 36 L 60 36" stroke="#586e75" stroke-width="0.8" />
      <text x="37.5" y="52" fill="#93a1a1" font-family="monospace" font-size="8" text-anchor="middle">NAND 0</text>
      
      <!-- NAND Flash Memory Chip 1 -->
      <rect x="15" y="80" width="45" height="50" rx="2" fill="#002b36" stroke="#93a1a1" stroke-width="1" />
      <path d="M 15 88 L 60 88 M 15 96 L 60 96" stroke="#586e75" stroke-width="0.8" />
      <text x="37.5" y="112" fill="#93a1a1" font-family="monospace" font-size="8" text-anchor="middle">NAND 1</text>
      
      <!-- SSD Controller CPU & Controller RAM Cache -->
      <rect x="75" y="45" width="35" height="35" rx="3" fill="#586e75" stroke="#cb4b16" stroke-width="1.5" />
      <rect x="75" y="90" width="35" height="18" rx="1.5" fill="#002b36" stroke="#93a1a1" stroke-width="1" />
      
      <!-- M.2 Branding Label -->
      <text x="92.5" y="32" fill="#2aa198" font-family="monospace" font-size="7" font-weight="bold" text-anchor="middle">NVMe M.2</text>
      <text x="92.5" y="125" fill="#93a1a1" font-family="monospace" font-size="7" text-anchor="middle">DISK / SSD</text>
    </g>
  </g>

  <!-- ========================================================================= -->
  <!-- COMPONENT 2: CENTRAL PROCESSOR CHIPSET ROUTING HUB                        -->
  <!-- ========================================================================= -->
  <g id="part-chipset">
    <!-- Component Chipset Area -->
    <rect class="mobo-part" x="330" y="170" width="100" height="90" rx="10" />
    
    <!-- Central Chipset body -->
    <g transform="translate(330, 170)">
      <!-- Copper Heatspreader base -->
      <rect x="10" y="10" width="80" height="70" rx="6" fill="#cb4b16" stroke="#b58900" stroke-width="1.5" />
      
      <!-- Sleek metallic heatsink fins structure -->
      <g stroke="#002b36" stroke-width="2">
        <line x1="20" y1="20" x2="20" y2="70" />
        <line x1="30" y1="20" x2="30" y2="70" />
        <line x1="40" y1="20" x2="40" y2="70" />
        <line x1="50" y1="20" x2="50" y2="70" />
        <line x1="60" y1="20" x2="60" y2="70" />
        <line x1="70" y1="20" x2="70" y2="70" />
      </g>
      
      <!-- Center Chip Label -->
      <rect x="25" y="35" width="50" height="20" rx="2" fill="#586e75" stroke="#93a1a1" stroke-width="1" />
      <text x="50" y="48" fill="#fdf6e3" font-family="monospace" font-size="8" font-weight="bold" text-anchor="middle">CHIPSET</text>
    </g>
  </g>

  <!-- ========================================================================= -->
  <!-- COMPONENT 3: 4 ACCURATE DUAL-CHANNEL DIMM RAM SLOTS                       -->
  <!-- ========================================================================= -->
  <g id="part-ram">
    <!-- RAM slots boundary -->
    <rect class="mobo-part" x="430" y="40" width="115" height="150" rx="8" />
    
    <!-- 4 Detailed RAM DIMM Rails -->
    <g transform="translate(430, 40)">
      <!-- DIMM Rails background outlines -->
      <rect x="10" y="15" width="95" height="12" rx="2" fill="#073642" stroke="#586e75" stroke-width="1" />
      <rect x="10" y="45" width="95" height="12" rx="2" fill="#073642" stroke="#586e75" stroke-width="1" />
      <rect x="10" y="75" width="95" height="12" rx="2" fill="#073642" stroke="#586e75" stroke-width="1" />
      <rect x="10" y="105" width="95" height="12" rx="2" fill="#073642" stroke="#586e75" stroke-width="1" />
      
      <!-- 4 Populated RAM Modules -->
      <g>
        <!-- Gold Contact Pins on the LEFT edge of each rail -->
        <line x1="12" y1="17" x2="12" y2="25" stroke="#b58900" stroke-width="2" stroke-dasharray="2 1" />
        <line x1="12" y1="47" x2="12" y2="55" stroke="#b58900" stroke-width="2" stroke-dasharray="2 1" />
        <line x1="12" y1="77" x2="12" y2="85" stroke="#b58900" stroke-width="2" stroke-dasharray="2 1" />
        <line x1="12" y1="107" x2="12" y2="115" stroke="#b58900" stroke-width="2" stroke-dasharray="2 1" />

        <!-- SMT Memory chips on each RAM module -->
        <g fill="#93a1a1">
          <!-- RAM Stick 1 chips -->
          <rect x="25" y="17" width="10" height="8" rx="0.5" />
          <rect x="45" y="17" width="10" height="8" rx="0.5" />
          <rect x="65" y="17" width="10" height="8" rx="0.5" />
          <rect x="85" y="17" width="10" height="8" rx="0.5" />

          <!-- RAM Stick 2 chips -->
          <rect x="25" y="47" width="10" height="8" rx="0.5" />
          <rect x="45" y="47" width="10" height="8" rx="0.5" />
          <rect x="65" y="47" width="10" height="8" rx="0.5" />
          <rect x="85" y="47" width="10" height="8" rx="0.5" />

          <!-- RAM Stick 3 chips -->
          <rect x="25" y="77" width="10" height="8" rx="0.5" />
          <rect x="45" y="77" width="10" height="8" rx="0.5" />
          <rect x="65" y="77" width="10" height="8" rx="0.5" />
          <rect x="85" y="77" width="10" height="8" rx="0.5" />

          <!-- RAM Stick 4 chips -->
          <rect x="25" y="107" width="10" height="8" rx="0.5" />
          <rect x="45" y="107" width="10" height="8" rx="0.5" />
          <rect x="65" y="107" width="10" height="8" rx="0.5" />
          <rect x="85" y="107" width="10" height="8" rx="0.5" />
        </g>
      </g>
      
      <!-- Side lock clips -->
      <rect x="5" y="12" width="5" height="18" fill="#586e75" rx="1" />
      <rect x="105" y="12" width="5" height="18" fill="#586e75" rx="1" />
      <rect x="5" y="102" width="5" height="18" fill="#586e75" rx="1" />
      <rect x="105" y="102" width="5" height="18" fill="#586e75" rx="1" />
      
      <!-- Label -->
      <text x="57.5" y="138" fill="#93a1a1" font-family="monospace" font-size="8" font-weight="bold" text-anchor="middle">RAM (DDR4)</text>
    </g>
  </g>

  <!-- ========================================================================= -->
  <!-- COMPONENT 4: MULTI-CORE CPU CORE SOCKET & CACHE HIERARCHY                 -->
  <!-- ========================================================================= -->
  <g id="part-cpu">
    <!-- CPU Slot Interaction Boundary -->
    <rect class="mobo-part" x="590" y="100" width="170" height="210" rx="12" />
    
    <!-- Complete CPU Socket Assembly -->
    <g transform="translate(590, 100)">
      <!-- Outer Metal Socket Frame -->
      <rect x="5" y="10" width="160" height="190" rx="6" fill="#586e75" stroke="#93a1a1" stroke-width="2" />
      
      <!-- Load Lever latch arm -->
      <rect x="157" y="20" width="5" height="150" fill="#93a1a1" rx="1.5" />
      <circle cx="159.5" cy="170" r="4.5" fill="#586e75" />
      
      <!-- Silicon Core Die (L2 Cache boundary outline) -->
      <rect id="cpu-die" class="cpu-die" x="25" y="30" width="115" height="120" rx="4" />
      
      <!-- 1. Shared Cache L3 block (located at the bottom of the die) -->
      <rect id="cpu-l3" class="cpu-l3-region" x="35" y="115" width="95" height="25" rx="2" />
      <text x="82.5" y="132" fill="#93a1a1" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">CACHE L3 (SHARED)</text>
      
      <!-- 4 CPU Cores (Quadrant inside L2 Die) -->
      <!-- CORE 0 (Top-Left, hosts L1 cache & Registers) -->
      <g id="cpu-core-0">
        <!-- Core container -->
        <rect class="cpu-core" x="35" y="40" width="45" height="34" rx="2" />
        <text x="57.5" y="50" fill="#93a1a1" font-family="monospace" font-size="7" font-weight="bold" text-anchor="middle">CORE 0</text>
        
        <!-- Inner Core Cache Level 1 (L1) quadrant -->
        <rect id="cpu-l1" class="cpu-l1-region" x="38" y="55" width="22" height="16" rx="1" />
        <text x="49" y="65" fill="#fdf6e3" font-family="monospace" font-size="5" text-anchor="middle">L1</text>
        
        <!-- CPU Registers (Reg) block -->
        <rect id="cpu-reg" class="cpu-reg-region" x="63" y="55" width="14" height="16" rx="1" />
        <text x="70" y="65" fill="#268bd2" font-family="monospace" font-size="5" text-anchor="middle">REG</text>
      </g>
      
      <!-- CORE 1 (Top-Right) -->
      <g id="cpu-core-1">
        <rect class="cpu-core" x="85" y="40" width="45" height="34" rx="2" />
        <text x="107.5" y="54" fill="#93a1a1" font-family="monospace" font-size="7" text-anchor="middle">CORE 1</text>
        <rect x="88" y="60" width="39" height="10" fill="#002b36" opacity="0.3" rx="1" />
      </g>
      
      <!-- CORE 2 (Middle-Left) -->
      <g id="cpu-core-2">
        <rect class="cpu-core" x="35" y="78" width="45" height="34" rx="2" />
        <text x="57.5" y="92" fill="#93a1a1" font-family="monospace" font-size="7" text-anchor="middle">CORE 2</text>
        <rect x="38" y="98" width="39" height="10" fill="#002b36" opacity="0.3" rx="1" />
      </g>
      
      <!-- CORE 3 (Middle-Right) -->
      <g id="cpu-core-3">
        <rect class="cpu-core" x="85" y="78" width="45" height="34" rx="2" />
        <text x="107.5" y="92" fill="#93a1a1" font-family="monospace" font-size="7" text-anchor="middle">CORE 3</text>
        <rect x="88" y="98" width="39" height="10" fill="#002b36" opacity="0.3" rx="1" />
      </g>
      
      <!-- Inner CPU Core interconnecting data pathways (L3 -> L2 -> L1 -> Registers) -->
      <path id="bus-cpu-internal" class="mobo-bus" d="M 82.5 115 L 82.5 76 L 68 76 L 68 71" opacity="0.6" stroke-width="1.2" />

      <!-- Label -->
      <text x="82.5" y="192" fill="#93a1a1" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">CPU (MULTI-CORE)</text>
    </g>
  </g>
</svg>
