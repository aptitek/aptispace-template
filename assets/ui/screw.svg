<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none">
  <!-- Outer metallic thread border -->
  <circle cx="10" cy="10" r="9" fill="url(#screw-metallic)" stroke="#586e75" stroke-width="1"/>
  <!-- Inner indentation -->
  <circle cx="10" cy="10" r="7" fill="#002b36" opacity="0.3"/>
  <!-- Screw slot/groove (slotted head) -->
  <rect x="3" y="9" width="14" height="2" rx="0.5" fill="#586e75" />
  
  <defs>
    <linearGradient id="screw-metallic" x1="3" y1="3" x2="17" y2="17" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93a1a1"/>
      <stop offset="50%" stop-color="#586e75"/>
      <stop offset="100%" stop-color="#073642"/>
    </linearGradient>
  </defs>
</svg>
