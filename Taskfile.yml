version: '3'

tasks:
  clean:
    desc: Clean build outputs and cache directories
    cmds:
      - echo "Cleaning Quarto build artifacts..."
      - rm -rf .quarto _site .jupyterlite.doit.db
      - echo "Clean complete."

  render:
    desc: Render the Quarto site
    cmds:
      - echo "Rendering Quarto site..."
      - quarto render

  preview:
    desc: Preview the Quarto site with live reload
    cmds:
      - echo "Starting Quarto preview server..."
      - quarto preview

  lint:
    desc: Lint and format Quarto markdown files
    cmds:
      - echo "Linting and formatting files..."
      - python3 scripts/code-lint.py .
      - python3 scripts/quarto-lint.py .

  upgrade:
    desc: Pull latest framework files from the sibling template/ into this course
    cmds:
      - |
        SELF=$(pwd)
        TMPL="$(dirname "$SELF")/template"
        if [ ! -d "$TMPL" ]; then
          echo "Error: $TMPL not found. Run this task from inside a course directory (sibling of template/)."
          exit 1
        fi

        echo "Upgrading framework from $TMPL..."

        # SCSS theme — preserve course-specific overrides (e.g. book_custom.css)
        mkdir -p .theme
        rsync -a --delete --exclude 'book_custom.css' "$TMPL/.theme/" .theme/

        # JS assets
        mkdir -p assets/js
        rsync -a --delete "$TMPL/assets/js/" assets/js/

        # Standalone asset files (viewer, link-fix shim)
        for f in assets/viewer.html assets/fix_links.html; do
          [ -f "$TMPL/$f" ] && cp "$TMPL/$f" "$f" && echo "  copied $f"
        done

        # Infrastructure directories
        for d in _extensions scripts fonts; do
          [ -d "$TMPL/$d" ] && { mkdir -p "$d"; rsync -a --delete "$TMPL/$d/" "$d/"; }
        done

        # Taskfile — self-updating so the next upgrade also ships the latest version
        cp "$TMPL/Taskfile.yml" Taskfile.yml

        # Record synced commit
        git -C "$TMPL" rev-parse HEAD > .template-sync

        echo ""
        echo "✓ Framework upgraded to $(cat .template-sync | cut -c1-8)"
        echo "  Review: git diff  |  Deploy: task publish"

  publish:

    desc: Lint, clean, render, and publish updates by committing and pushing to origin main
    cmds:
      - |
        CURRENT_BRANCH=$(git branch --show-current)
        if [ "$CURRENT_BRANCH" != "main" ]; then
          echo "Error: You are on branch '$CURRENT_BRANCH'. Publishing is only allowed on the 'main' branch."
          exit 1
        fi
        
        eval set -- {{.CLI_ARGS}}
        MSG=${1:-"feat: update template"}
        
        echo "Staging changes..."
        git add .
        
        echo "Committing changes..."
        git commit -m "$MSG" || echo "No changes to commit"
        
        echo "Pushing to origin main..."
        git push origin main
        echo "Publish complete."
